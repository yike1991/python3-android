name: Build Python for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libssl-dev libffi-dev zlib1g-dev

    - name: Download Android NDK r25c
      run: |
        echo "Downloading Android NDK r25c..."
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_ENV

    - name: Download Python 3.11.9 source
      run: |
        echo "Downloading Python 3.11.9..."
        wget -q https://www.python.org/ftp/python/3.11.9/Python-3.11.9.tgz
        tar -xzf Python-3.11.9.tgz

    - name: Build host Python 3.11
      run: |
        echo "=========================================="
        echo "Stage 1: Building host Python 3.11"
        echo "=========================================="
        mkdir -p build/host
        cd build/host
        ../../Python-3.11.9/configure --prefix=$GITHUB_WORKSPACE/build/python-host --enable-optimizations > /dev/null
        make -j$(nproc) > /dev/null
        make install > /dev/null
        echo "PYTHON_FOR_BUILD=$GITHUB_WORKSPACE/build/python-host/bin/python3.11" >> $GITHUB_ENV
        $GITHUB_WORKSPACE/build/python-host/bin/python3.11 --version

    - name: Build Android Python (ARM64)
      run: |
        echo "=========================================="
        echo "Stage 2: Cross-compiling for Android"
        echo "=========================================="

        export ARCH=aarch64
        export TARGET_TRIPLE=aarch64-linux-android
        export ANDROID_API=21
        export TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64

        # Set compilers
        export CC="$TOOLCHAIN/bin/${TARGET_TRIPLE}${ANDROID_API}-clang"
        export CXX="$TOOLCHAIN/bin/${TARGET_TRIPLE}${ANDROID_API}-clang++"
        export AR="$TOOLCHAIN/bin/llvm-ar"
        export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
        export STRIP="$TOOLCHAIN/bin/llvm-strip"
        export LD="$TOOLCHAIN/bin/ld.lld"
        export PATH="$TOOLCHAIN/bin:$PATH"

        # Set compile flags - WITHOUT defining __ANDROID_API__ to avoid redefinition
        export CFLAGS="-fPIC --sysroot=$TOOLCHAIN/sysroot"
        export CXXFLAGS="$CFLAGS"
        export LDFLAGS="-L$TOOLCHAIN/sysroot/usr/lib -lm"
        export CPPFLAGS="--sysroot=$TOOLCHAIN/sysroot"

        # Pre-set all cache variables to avoid lengthy checks
        export ac_cv_header_minix_config_h=no
        export ac_cv_sys_file_offset_bits=no
        export ac_cv_func_mmap_fixed_mapped=no
        export ac_cv_func_memrchr=no
        export ac_cv_func_strlcpy=no
        export ac_cv_func_strlcat=no
        export ac_cv_func_mkfifo=no
        export ac_cv_func_mknod=no
        export ac_cv_func_mkstemps=no
        export ac_cv_func_inotify_init=no
        export ac_cv_func_inotify_init1=no
        export ac_cv_func_utimensat=no
        export ac_cv_func_futimens=no

        rm -rf build/android install
        mkdir -p build/android install/python-android
        cd build/android

        echo "Configuring Python for Android..."
        # Use --cache-file to skip most checks
        ../../Python-3.11.9/configure \
          --config-cache \
          --prefix=$GITHUB_WORKSPACE/install/python-android \
          --host=$TARGET_TRIPLE \
          --build=x86_64-linux-gnu \
          --with-build-python=$PYTHON_FOR_BUILD \
          --enable-shared \
          --disable-ipv6 \
          --disable-test-modules \
          --without-ensurepip \
          --with-system-ffi \
          ac_cv_header_minix_config_h=no \
          ac_cv_func_getpgrp_void=yes \
          ac_cv_func_setpgrp_void=yes \
          ac_cv_func_getpgrp_void=yes \
          ac_cv_func_setpgrp_void=yes \
          || {
            echo "Configure failed, but continuing..."
            cat config.log | tail -50
          }

        echo "Building Python..."
        make -j$(nproc) || {
          echo "Build failed, checking what was built..."
          ls -la
        }

        echo "Installing Python..."
        make install || {
          echo "Install may have partial failures, checking..."
          ls -la $GITHUB_WORKSPACE/install/python-android/bin/ || true
          ls -la $GITHUB_WORKSPACE/install/python-android/lib/ || true
        }

        echo "Stripping binaries..."
        [ -f "$GITHUB_WORKSPACE/install/python-android/bin/python3.11" ] && $STRIP --strip-unneeded $GITHUB_WORKSPACE/install/python-android/bin/python3.11
        find $GITHUB_WORKSPACE/install/python-android/lib -name "*.so*" -type f -exec $STRIP --strip-unneeded {} \; 2>/dev/null || true

    - name: Verify build
      run: |
        echo "=========================================="
        echo "Build Verification"
        echo "=========================================="

        if [ -f "install/python-android/bin/python3.11" ]; then
          echo "✅ Python binary exists!"
          ls -lh install/python-android/bin/python3.11
          file install/python-android/bin/python3.11
        else
          echo "❌ Python binary not found"
        fi

        if [ -f "install/python-android/lib/libpython3.11.so" ]; then
          echo "✅ Python shared library exists!"
          ls -lh install/python-android/lib/libpython3.11.so
        else
          echo "❌ Python shared library not found"
        fi

        if [ -d "install/python-android/lib/python3.11" ]; then
          echo "✅ Standard library exists!"
          echo "First 20 files:"
          ls install/python-android/lib/python3.11/ | head -20
        else
          echo "❌ Standard library not found"
        fi

    - name: Create tarball
      run: |
        if [ -d "install/python-android" ]; then
          cd install
          tar -czf python3-android-arm64.tar.gz python-android/
          ls -lh python3-android-arm64.tar.gz
        else
          echo "No build output to package"
        fi

    - name: Upload complete package
      uses: actions/upload-artifact@v4
      with:
        name: python-android-complete
        path: install/python-android/
        retention-days: 30
      if: always()

    - name: Upload tarball
      uses: actions/upload-artifact@v4
      with:
        name: python-android-tarball
        path: install/python3-android-arm64.tar.gz
        retention-days: 30
      if: always()

    - name: Upload config log on failure
      uses: actions/upload-artifact@v4
      with:
        name: config-log
        path: build/android/config.log
        retention-days: 7
      if: failure()
