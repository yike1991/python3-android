name: Build Python for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libssl-dev libffi-dev zlib1g-dev binutils

    - name: Download Android NDK r25c
      run: |
        echo "Downloading Android NDK r25c..."
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25c" >> $GITHUB_ENV
        echo "NDK setup complete"

    - name: Download Python 3.11.9 source
      run: |
        echo "Downloading Python 3.11.9..."
        wget -q https://www.python.org/ftp/python/3.11.9/Python-3.11.9.tgz
        tar -xzf Python-3.11.9.tgz
        echo "Python source extracted"

    - name: Build host Python 3.11
      run: |
        echo "=========================================="
        echo "Stage 1: Building host Python 3.11"
        echo "=========================================="
        mkdir -p build/host
        cd build/host
        ../../Python-3.11.9/configure --prefix=$GITHUB_WORKSPACE/build/python-host --quiet
        make -j$(nproc) --quiet
        make install --quiet
        echo "PYTHON_FOR_BUILD=$GITHUB_WORKSPACE/build/python-host/bin/python3.11" >> $GITHUB_ENV
        $GITHUB_WORKSPACE/build/python-host/bin/python3.11 --version

    - name: Build Android Python (ARM64)
      run: |
        echo "=========================================="
        echo "Stage 2: Cross-compiling for Android"
        echo "=========================================="

        export ARCH=aarch64
        export TARGET_TRIPLE=aarch64-linux-android
        export ANDROID_API=21
        export TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64

        # Set compilers
        export CC="$TOOLCHAIN/bin/${TARGET_TRIPLE}${ANDROID_API}-clang"
        export CXX="$TOOLCHAIN/bin/${TARGET_TRIPLE}${ANDROID_API}-clang++"
        export AR="$TOOLCHAIN/bin/llvm-ar"
        export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
        export STRIP="$TOOLCHAIN/bin/llvm-strip"
        export LD="$TOOLCHAIN/bin/ld.lld"
        export PATH="$TOOLCHAIN/bin:$PATH"

        # Compile flags
        export CFLAGS="-fPIC --sysroot=$TOOLCHAIN/sysroot"
        export CXXFLAGS="$CFLAGS"
        export LDFLAGS="-L$TOOLCHAIN/sysroot/usr/lib -lm"
        export CPPFLAGS="--sysroot=$TOOLCHAIN/sysroot"

        echo "Compiler: $CC"
        $CC --version
        which readelf
        readelf --version

        rm -rf build/android install
        mkdir -p build/android install/python-android
        cd build/android

        echo "=== Starting Configure ==="
        set +e
        ../../Python-3.11.9/configure \
          --prefix=$GITHUB_WORKSPACE/install/python-android \
          --host=$TARGET_TRIPLE \
          --build=x86_64-linux-gnu \
          --with-build-python=$PYTHON_FOR_BUILD \
          --enable-shared \
          --disable-ipv6 \
          --disable-test-modules \
          --without-ensurepip \
          --with-system-ffi \
          ac_cv_header_minix_config_h=no \
          ac_cv_func_getpgrp_void=yes \
          ac_cv_func_setpgrp_void=yes
        CONFIG_STATUS=$?
        set -e
        echo "Configure exit code: $CONFIG_STATUS"

        if [ $CONFIG_STATUS -ne 0 ]; then
          echo "Configure failed! Last 100 lines of config.log:"
          tail -100 config.log
          exit 1
        fi

        echo "=== Starting Build ==="
        make -j$(nproc)
        echo "Build completed!"

        echo "=== Starting Install ==="
        make install
        echo "Install completed!"

        echo "=== Verifying Installation ==="
        ls -la $GITHUB_WORKSPACE/install/python-android/bin/
        ls -la $GITHUB_WORKSPACE/install/python-android/lib/

    - name: Verify build and upload
      run: |
        echo "=========================================="
        echo "Build Verification"
        echo "=========================================="

        # Check if build succeeded
        if [ ! -f "install/python-android/bin/python3.11" ]; then
          echo "ERROR: Python binary not found!"
          exit 1
        fi

        if [ ! -f "install/python-android/lib/libpython3.11.so" ]; then
          echo "ERROR: Python shared library not found!"
          exit 1
        fi

        echo "✅ Python binary:"
        ls -lh install/python-android/bin/python3.11
        file install/python-android/bin/python3.11

        echo "✅ Python shared library:"
        ls -lh install/python-android/lib/libpython3.11.so

        echo "✅ Standard library:"
        ls install/python-android/lib/python3.11/ | head -20

        # Check for frozen modules
        if strings install/python-android/bin/python3.11 | grep -q "importlib._bootstrap"; then
          echo "✅ Frozen modules embedded correctly!"
        else
          echo "⚠️  Warning: Frozen modules may not be embedded"
        fi

        # Create tarball
        cd install
        tar -czf python3-android-arm64.tar.gz python-android/
        echo "✅ Tarball created:"
        ls -lh python3-android-arm64.tar.gz

    - name: Upload complete package
      uses: actions/upload-artifact@v4
      with:
        name: python-android-complete
        path: install/python-android/
        retention-days: 30

    - name: Upload tarball
      uses: actions/upload-artifact@v4
      with:
        name: python-android-tarball
        path: install/python3-android-arm64.tar.gz
        retention-days: 30
